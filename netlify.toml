[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/virustotal/lookup"
  to = "/.netlify/functions/tool-gateway?tool=virustotal"
  status = 200

[[redirects]]
  from = "/api/abuseipdb/check"
  to = "/.netlify/functions/tool-gateway?tool=abuseipdb"
  status = 200

